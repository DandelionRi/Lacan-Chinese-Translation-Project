name: mdBook

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main
      - DEV
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mdBook
        env:
          MDBOOK_VERSION: 0.5.2
        run: |
          curl -LsSf "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          sudo mv mdbook /usr/local/bin/mdbook
          mdbook --version

      - name: Install Python script dependencies
        run: python3 -m pip install -r scripts/requirements.txt

      - name: Generate mdBook input
        run: python3 scripts/build_from_texts.py

      - name: Build mdBook
        run: mdbook build

      - name: Zip book directory
        if: startsWith(github.ref, 'refs/tags/')
        run: zip -r book.zip book

      - name: Upload book zip artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: book-zip
          path: book.zip
          if-no-files-found: error
          retention-days: 1

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: book

  deploy:
    name: Deploy GitHub Pages
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  publish-release:
    name: Upload book zip to Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download book zip artifact
        uses: actions/download-artifact@v4
        with:
          name: book-zip
          path: release

      - name: Upload book zip to Release
        working-directory: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          release_tag="${GITHUB_REF_NAME}"
          release_title="${GITHUB_REF_NAME}"

          if ! gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release create "${release_tag}" \
              --title "${release_title}" \
              --notes "mdBook build output for ${release_tag}." \
              --target "${GITHUB_SHA}"
          fi

          gh release upload "${release_tag}" book.zip --clobber
