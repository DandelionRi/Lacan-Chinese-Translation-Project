name: mdBook

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - DEV
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install mdBook
        env:
          MDBOOK_VERSION: 0.5.2
        run: |
          curl -LsSf "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          sudo mv mdbook /usr/local/bin/mdbook
          mdbook --version

      - name: Install Python script dependencies
        run: python3 -m pip install -r scripts/requirements.txt

      - name: Generate mdBook input
        run: python3 scripts/build_from_texts.py

      - name: Build mdBook
        run: mdbook build

      - name: Upload book package artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: book-package
          path: book
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: book

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5

  publish-package:
    name: Publish book zip package
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download book package artifact
        uses: actions/download-artifact@v4
        with:
          name: book-package
          path: package/book

      - name: Create book zip
        working-directory: package
        run: |
          python3 <<'PY'
          import os
          import zipfile

          with zipfile.ZipFile('book.zip', 'w', zipfile.ZIP_DEFLATED) as archive:
              for root, _, files in os.walk('book'):
                  for filename in files:
                      path = os.path.join(root, filename)
                      archive.write(path)
          PY

          ls -lh book.zip

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "${GHCR_TOKEN}" | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish zip to GitHub Packages
        working-directory: package
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          owner="$(printf '%s' "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(printf '%s' "${REPOSITORY_NAME}" | tr '[:upper:]' '[:lower:]')"
          package_ref="ghcr.io/${owner}/${repo}-book"
          run_tag="run-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          sha_tag="sha-${GITHUB_SHA::12}"

          publish() {
            local tag="$1"
            oras push "${package_ref}:${tag}" \
              --artifact-type application/zip \
              --annotation "org.opencontainers.image.title=book.zip" \
              --annotation "org.opencontainers.image.description=Built mdBook book directory archive." \
              --annotation "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
              --annotation "org.opencontainers.image.revision=${GITHUB_SHA}" \
              book.zip:application/zip
          }

          publish "${run_tag}"
          publish "${sha_tag}"
          publish latest
